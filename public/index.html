<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>極簡智能投票系統 | Decidely</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Stylesheet -->
    <link rel="stylesheet" href="styles.css">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <div class="app-container">
        <!-- Sidebar: Polls Navigation -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="logo">
                    <i data-lucide="vote" class="logo-icon"></i>
                    <span>Decidely</span>
                </div>
                <button id="btn-create-poll-sidebar" class="btn btn-primary btn-sm btn-icon-only" title="建立新投票">
                    <i data-lucide="plus"></i>
                </button>
            </div>
            
            <div class="search-box">
                <i data-lucide="search" class="search-icon"></i>
                <input type="text" id="poll-search" placeholder="搜尋投票項目...">
            </div>

            <div class="poll-list-wrapper">
                <h3 class="section-title">所有投票</h3>
                <div id="polls-list" class="polls-list">
                    <!-- Dynamic polls load here -->
                    <div class="polls-skeleton">
                        <div class="skeleton-item"></div>
                        <div class="skeleton-item"></div>
                        <div class="skeleton-item"></div>
                    </div>
                </div>
            </div>
            
            <div class="sidebar-footer">
                <button id="btn-open-create" class="btn btn-secondary w-full">
                    <i data-lucide="plus-circle"></i>
                    <span>建立新投票</span>
                </button>
            </div>
        </aside>

        <!-- Main Content Area -->
        <main class="main-content">
            <!-- App Header Bar -->
            <header class="app-header">
                <div class="user-profile-widget">
                    <div class="avatar-upload-wrapper" id="profile-avatar-trigger" title="點擊上傳頭像">
                        <i data-lucide="user" class="user-icon" id="profile-avatar-icon"></i>
                        <img id="profile-avatar-preview" src="" alt="大頭貼" class="hidden">
                        <input type="file" id="profile-avatar-input" accept="image/*" style="display: none;">
                    </div>
                    <span class="user-name-label">您的暱稱：</span>
                    <input type="text" id="username-input" placeholder="匿名" maxlength="20">
                </div>
            </header>

            <!-- Active Poll View -->
            <section id="active-poll-section" class="poll-view">
                <!-- Poll Header -->
                <div class="poll-detail-header">
                    <div class="poll-header-top">
                        <div class="poll-meta">
                            <span class="badge" id="poll-status-badge">進行中</span>
                            <span class="text-muted" id="poll-date">建立於: 2026-07-02</span>
                        </div>
                        <div class="poll-actions">
                            <button id="btn-manage-poll" class="btn btn-secondary btn-sm" title="管理此投票主題">
                                <i data-lucide="settings"></i> <span>管理</span>
                            </button>
                            <button id="btn-delete-poll" class="btn btn-danger btn-sm" title="刪除此投票主題">
                                <i data-lucide="trash-2"></i> <span>刪除主題</span>
                            </button>
                            <button id="btn-exit-manage-poll" class="btn btn-secondary btn-sm" title="退出管理模式">
                                <i data-lucide="log-out"></i> <span>退出管理</span>
                            </button>
                        </div>
                    </div>
                    <h1 id="active-poll-title" class="poll-title">載入中...</h1>
                    <div id="poll-image-container" class="poll-image-container hidden" style="margin-bottom: 16px; margin-top: 8px;">
                        <img id="active-poll-image" src="" alt="投票主題圖片" style="max-width: 100%; max-height: 240px; border-radius: var(--radius-md); border: 1px solid var(--border-color); object-fit: contain;">
                    </div>
                    <p id="active-poll-desc" class="poll-description">請稍候，正在載入投票資訊。</p>
                </div>

                <!-- Poll Options / Vote cards -->
                <div class="options-container">
                    <h3 class="section-title">選擇您的選項進行投票</h3>
                    <div id="options-list" class="options-list">
                        <!-- Dynamic options load here -->
                    </div>
                </div>

                <!-- Add Option Form -->
                <div class="add-option-card glass-panel">
                    <h4 class="card-subtitle"><i data-lucide="plus-circle"></i> 新增自訂選項</h4>
                    <p class="card-help">點子不夠多？為這個投票新增您自己的專屬選項！</p>
                    <form id="add-option-form" class="inline-form">
                        <div class="input-group">
                            <input type="text" id="new-option-input" placeholder="輸入新選項內容..." required maxlength="80">
                        </div>
                        <button type="submit" class="btn btn-secondary btn-nowrap">
                            <i data-lucide="plus"></i>
                            <span>新增選項</span>
                        </button>
                    </form>
                </div>
                
                <!-- Poll Summary Info -->
                <div class="poll-stats-summary">
                    <div class="stat-box">
                        <span class="stat-val" id="total-votes-count">0</span>
                        <span class="stat-lbl">總投票數</span>
                    </div>
                    <div class="stat-box">
                        <span class="stat-val" id="total-options-count">0</span>
                        <span class="stat-lbl">選項數量</span>
                    </div>
                </div>
            </section>

            <!-- No Poll Selected Placeholder -->
            <section id="no-poll-section" class="poll-view-placeholder hidden">
                <div class="placeholder-content">
                    <i data-lucide="help-circle" class="placeholder-icon"></i>
                    <h2>沒有選取任何投票</h2>
                    <p>請從左側列表選擇一個投票項目，或者點擊下方按鈕建立一個新的投票。</p>
                    <button id="btn-open-create-placeholder" class="btn btn-primary">
                        <i data-lucide="plus"></i>
                        <span>建立首個投票</span>
                    </button>
                </div>
            </section>
        </main>
    </div>

    <!-- Create Poll Modal Overlay -->
    <div id="create-modal" class="modal-overlay hidden">
        <div class="modal-card glass-panel animate-scale-up">
            <div class="modal-header">
                <h3><i data-lucide="plus-circle"></i> 建立新投票主題</h3>
                <button id="btn-close-modal" class="btn-close" aria-label="關閉" type="button">
                    <i data-lucide="x"></i>
                </button>
            </div>
            <form id="create-poll-form">
                <div class="modal-body">
                    <div class="create-poll-grid">
                        <!-- Left Column: Title, Description, Options -->
                        <div class="create-poll-col-left">
                            <div class="form-group">
                                <label for="poll-title-input">投票問題 / 主題 *</label>
                                <input type="text" id="poll-title-input" placeholder="例如：今天午餐吃什麼？" required maxlength="100">
                            </div>
                            
                            <div class="form-group">
                                <label for="poll-desc-input">投票描述 (選填)</label>
                                <textarea id="poll-desc-input" rows="2" placeholder="為投票提供一些背景資訊..." maxlength="250"></textarea>
                            </div>

                            <div class="form-group">
                                <label>投票選項 (至少兩個)</label>
                                <div id="modal-options-list" class="modal-options-list scrollable-options">
                                    <div class="modal-option-row">
                                        <input type="text" class="modal-option-input" placeholder="選項 1" required maxlength="80">
                                        <span class="drag-placeholder"></span>
                                    </div>
                                    <div class="modal-option-row">
                                        <input type="text" class="modal-option-input" placeholder="選項 2" required maxlength="80">
                                        <span class="drag-placeholder"></span>
                                    </div>
                                </div>
                                <button type="button" id="btn-add-modal-option" class="btn btn-link btn-sm" style="margin-top: 8px;">
                                    <i data-lucide="plus"></i> 新增選項欄位
                                </button>
                            </div>
                        </div>

                        <!-- Right Column: Settings, Password, Image Upload -->
                        <div class="create-poll-col-right">
                            <div class="form-group">
                                <label>投票設定</label>
                                <div class="form-group-checkboxes-vertical">
                                    <div class="form-group-checkbox">
                                        <input type="checkbox" id="poll-allow-multiple">
                                        <label for="poll-allow-multiple">允許多選</label>
                                    </div>
                                    <div class="form-group-checkbox">
                                        <input type="checkbox" id="poll-allow-user-options" checked>
                                        <label for="poll-allow-user-options">任何人可以新增選項</label>
                                    </div>
                                </div>
                            </div>

                            <div class="form-group">
                                <label for="poll-password-input">設定投票管理密碼 (選填)</label>
                                <input type="password" id="poll-password-input" placeholder="管理者可用此密碼進行選票管理與刪除主題" maxlength="20">
                            </div>

                            <div class="form-group">
                                <label>上傳描述圖片 (選填)</label>
                                <div class="file-upload-wrapper" style="display: flex; align-items: center; gap: 8px;">
                                    <input type="file" id="poll-image-input" accept="image/*" style="display: none;">
                                    <button type="button" id="btn-trigger-upload" class="btn btn-secondary btn-sm" style="display: flex; align-items: center; gap: 6px;">
                                        <i data-lucide="image" style="width: 16px; height: 16px;"></i> <span>選擇圖片</span>
                                    </button>
                                    <span id="upload-file-name" class="file-name text-muted" style="font-size: 0.85rem; max-width: 180px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;">未選擇檔案</span>
                                    <button type="button" id="btn-clear-upload" class="btn btn-link btn-sm hidden" style="color: #ef4444; font-size: 0.85rem; border: none; background: transparent; cursor: pointer; margin-left: 8px;">清除</button>
                                </div>
                                <div id="image-preview-container" class="hidden" style="margin-top: 12px;">
                                    <img id="image-preview" src="" alt="圖片預覽" style="max-height: 80px; border-radius: var(--radius-sm); border: 1px solid var(--border-color); object-fit: contain;">
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" id="btn-cancel-poll" class="btn btn-ghost">取消</button>
                    <button type="submit" class="btn btn-primary">
                        <i data-lucide="check"></i> 建立並發佈
                    </button>
                </div>
            </form>
        </div>
    </div>

    <!-- Manage Password Authentication Modal -->
    <div id="manage-auth-modal" class="modal-overlay hidden">
        <div class="modal-card glass-panel animate-scale-up" style="max-width: 400px;">
            <div class="modal-header">
                <h3><i data-lucide="shield-alert"></i> 管理員身分驗證</h3>
                <button id="btn-close-auth-modal" class="btn-close" aria-label="關閉">
                    <i data-lucide="x"></i>
                </button>
            </div>
            <form id="manage-auth-form">
                <div class="modal-body">
                    <p class="auth-modal-desc" style="font-size: 0.88rem; color: var(--text-muted); margin-bottom: 16px;">
                        請輸入此投票主題的管理密碼，驗證成功後即可剔除投票者選票，或是刪除整個主題。
                    </p>
                    <div class="form-group">
                        <label for="manage-password-input">管理密碼</label>
                        <input type="password" id="manage-password-input" placeholder="請輸入密碼..." required maxlength="20">
                        <div class="error-message hidden" id="auth-error-msg" style="color: #ef4444; font-size: 0.8rem; margin-top: 6px;"></div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" id="btn-cancel-auth" class="btn btn-ghost">取消</button>
                    <button type="submit" class="btn btn-primary">
                        <i data-lucide="check"></i> 驗證密碼
                    </button>
                </div>
            </form>
        </div>
    </div>

    <!-- Toast Notifications Container -->
    <div id="toast-container" class="toast-container"></div>

    <!-- App Script -->
    <script src="app.js"></script>
</body>
</html>
