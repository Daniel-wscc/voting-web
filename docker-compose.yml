version: '3.8'

services:
  voting-app:
    container_name: decidely-voting-app
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "6500:6500"
    volumes:
      - voting_data:/app/data
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=6500
      - DATABASE_PATH=/app/data/voting.db

volumes:
  voting_data:
    driver: local
